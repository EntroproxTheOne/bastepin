<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bastepin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      /* Liquid blue-white animated gradient */
      background: linear-gradient(135deg, #e0f2fe, #bae6fd, #ddd6fe, #f5f3ff);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: #0f172a;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      padding: 24px;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Liquid Glass Card */
    .card {
      width: 100%;
      max-width: 680px;
      /* Glassmorphism */
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 10px 40px -10px rgba(31, 38, 135, 0.15), inset 0 0 0 1px rgba(255, 255, 255, 0.5);
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease;
    }

    /* Decorative glass orbs behind card */
    body::before, body::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      z-index: -1;
      filter: blur(60px);
      animation: float 10s ease-in-out infinite;
    }

    body::before {
      background: rgba(99, 102, 241, 0.4);
      top: 10%;
      left: 20%;
    }

    body::after {
      background: rgba(56, 189, 248, 0.4);
      bottom: 10%;
      right: 20%;
      animation-delay: -5s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .logo {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
      color: white;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #1e293b;
    }

    h1 span { 
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .slot-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    /* Uiverse-inspired slot buttons */
    .slot-btn {
      flex: 1;
      min-width: 80px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.3);
      color: #64748b;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(5px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .slot-btn:hover { 
      background: rgba(255, 255, 255, 0.6);
      color: #3b82f6; 
      transform: translateY(-2px);
    }

    .slot-btn.active { 
      background: #3b82f6; 
      color: white; 
      border-color: #3b82f6;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
      transform: scale(1.03); 
    }

    textarea {
      width: 100%;
      height: 260px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 16px;
      color: #0f172a;
      font-size: 1rem;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      padding: 18px;
      resize: vertical;
      outline: none;
      transition: all 0.3s ease;
      line-height: 1.6;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }

    textarea:focus { 
      background: rgba(255, 255, 255, 0.8);
      border-color: #3b82f6; 
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15), inset 0 2px 4px rgba(0,0,0,0.02);
    }
    textarea::placeholder { color: #64748b; }

    .char-count {
      font-size: 0.8rem;
      color: #64748b;
      text-align: right;
      margin-top: 8px;
      margin-bottom: 20px;
      font-weight: 500;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-width: 100px;
      padding: 14px 20px;
      border: none;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }

    /* Uiverse Shine effect */
    button::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: all 0.5s ease;
    }

    button:hover::after {
      left: 100%;
    }

    .btn-save {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
      flex: 2;
    }

    .btn-save:hover { 
      transform: translateY(-2px); 
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
    }
    .btn-save:active { transform: translateY(1px); }

    .btn-load {
      background: rgba(255, 255, 255, 0.7);
      color: #0f172a;
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
    }

    .btn-load:hover { 
      background: rgba(255, 255, 255, 1); 
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.06);
    }

    .btn-copy {
      background: rgba(241, 245, 249, 0.7);
      color: #0f172a;
      border: 1px solid rgba(255, 255, 255, 0.9);
    }

    .btn-copy:hover { 
      background: rgba(255, 255, 255, 1);
      transform: translateY(-2px);
    }

    .btn-clear {
      background: rgba(254, 226, 226, 0.5);
      color: #ef4444;
      border: 1px solid rgba(254, 202, 202, 0.6);
      flex: 0 0 auto;
      padding: 14px 18px;
    }

    .btn-clear:hover { 
      background: #fee2e2; 
      transform: scale(1.05);
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 0.85rem;
      color: #475569;
      font-weight: 500;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #94a3b8;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.5);
    }

    .dot.online { background: #10b981; box-shadow: 0 0 8px rgba(16, 185, 129, 0.5); }
    .dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
    .dot.error { background: #ef4444; }

    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); } 
      50% { opacity: 0.5; transform: scale(1.2); }
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Glass Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.9);
      color: #0f172a;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      pointer-events: none;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s;
      opacity: 0;
      white-space: nowrap;
      z-index: 50;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.error {
      background: rgba(254, 226, 226, 0.9);
      border-color: rgba(252, 165, 165, 0.5);
      color: #b91c1c;
    }
  </style>
</head>
<body>

<div class="card">
  <header>
    <div class="logo">📋</div>
    <div>
      <h1>Baste<span>pin</span></h1>
    </div>
  </header>

  <div class="slot-row" id="slotRow">
    <button class="slot-btn active" data-slot="1">Slot 1</button>
    <button class="slot-btn" data-slot="2">Slot 2</button>
    <button class="slot-btn" data-slot="3">Slot 3</button>
    <button class="slot-btn" data-slot="4">Slot 4</button>
    <button class="slot-btn" data-slot="5">Slot 5</button>
  </div>

  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="statusText">Ready</span>
  </div>

  <textarea id="content" placeholder="Paste your text here, then click Save. On another device, click Load to retrieve it."></textarea>

  <div class="char-count" id="charCount">0 characters</div>

  <div class="btn-row">
    <button class="btn-save" id="btnSave" onclick="saveClip()">
      <span>💾</span> Save
    </button>
    <button class="btn-load" id="btnLoad" onclick="loadClip()">
      <span>⬇️</span> Load
    </button>
    <button class="btn-copy" id="btnCopy" onclick="copyToClipboard()">
      <span>📄</span> Copy
    </button>
    <button class="btn-clear" onclick="clearContent()" title="Clear">✕</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let currentSlot = 1;

  const textarea = document.getElementById('content');
  const charCount = document.getElementById('charCount');
  const dot = document.getElementById('dot');
  const statusText = document.getElementById('statusText');
  const toast = document.getElementById('toast');

  // Slot switching
  document.getElementById('slotRow').addEventListener('click', e => {
    const btn = e.target.closest('[data-slot]');
    if (!btn) return;
    document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSlot = btn.dataset.slot;
    textarea.value = '';
    updateCount();
    setStatus('ready');
  });

  textarea.addEventListener('input', updateCount);

  function updateCount() {
    const n = textarea.value.length;
    charCount.textContent = n.toLocaleString() + ' character' + (n !== 1 ? 's' : '');
  }

  function setStatus(state, msg) {
    dot.className = 'dot';
    if (state === 'loading') { dot.classList.add('loading'); statusText.textContent = msg || 'Working…'; }
    else if (state === 'online') { dot.classList.add('online'); statusText.textContent = msg || 'Done'; }
    else if (state === 'error') { dot.classList.add('error'); statusText.textContent = msg || 'Error'; }
    else { statusText.textContent = msg || 'Ready'; }
  }

  let toastTimer;
  function showToast(msg, isError = false) {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.className = 'toast' + (isError ? ' error' : '');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => toast.classList.add('show'));
    });
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
  }

  function setLoading(id, loading) {
    const btn = document.getElementById(id);
    if (!btn) return;
    if (loading) {
      btn._orig = btn.innerHTML;
      btn.innerHTML = '<span class="spinner"></span>';
      btn.disabled = true;
    } else {
      btn.innerHTML = btn._orig || btn.innerHTML;
      btn.disabled = false;
    }
  }

  async function saveClip() {
    const text = textarea.value;
    if (!text.trim()) { showToast('Nothing to save.', true); return; }
    setLoading('btnSave', true);
    setStatus('loading', 'Saving…');
    try {
      const res = await fetch('/api/clip', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ slot: currentSlot, text })
      });
      if (!res.ok) throw new Error(await res.text());
      setStatus('online', 'Saved to slot ' + currentSlot);
      showToast('✅ Saved to slot ' + currentSlot);
    } catch (e) {
      setStatus('error', 'Save failed');
      showToast('Save failed: ' + e.message, true);
    } finally {
      setLoading('btnSave', false);
    }
  }

  async function loadClip() {
    setLoading('btnLoad', true);
    setStatus('loading', 'Loading…');
    try {
      const res = await fetch('/api/clip?slot=' + encodeURIComponent(currentSlot));
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      textarea.value = data.text || '';
      updateCount();
      setStatus('online', 'Loaded slot ' + currentSlot);
      showToast(data.text ? '✅ Loaded slot ' + currentSlot : 'Slot ' + currentSlot + ' is empty');
    } catch (e) {
      setStatus('error', 'Load failed');
      showToast('Load failed: ' + e.message, true);
    } finally {
      setLoading('btnLoad', false);
    }
  }

  async function copyToClipboard() {
    const text = textarea.value;
    if (!text) { showToast('Nothing to copy.', true); return; }
    try {
      await navigator.clipboard.writeText(text);
      showToast('📄 Copied to clipboard!');
    } catch {
      showToast('Could not access clipboard.', true);
    }
  }

  function clearContent() {
    textarea.value = '';
    updateCount();
    setStatus('ready');
  }
</script>
</body>
</html>
